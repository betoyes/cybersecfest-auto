<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1350" />
    <title>CybersecFEST — Signal Mesh Enhanced · Motion v2</title>
    <style>
      @font-face {
        font-family: 'Ubuntu';
        font-style: normal;
        font-weight: 700;
        src: url('assets/fonts/Ubuntu-Bold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 400;
        src: url('assets/fonts/Montserrat-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 600;
        src: url('assets/fonts/Montserrat-SemiBold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 700;
        src: url('assets/fonts/Montserrat-Bold.woff2') format('woff2');
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: #02050A;
        font-family: 'Montserrat', sans-serif;
        color: #F6F8FF;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: #02050A;
      }

      .scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .bg-wrap {
        position: absolute;
        inset: -10%;
        z-index: 0;
        transform-origin: 72% 48%;
      }

      .bg-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: right center;
      }

      #overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(to right, rgba(2,5,10,0.88) 0%, rgba(2,5,10,0.78) 36%, rgba(2,5,10,0.22) 58%, rgba(2,5,10,0) 100%),
          linear-gradient(to top, rgba(2,5,10,0.68) 0%, rgba(2,5,10,0) 34%);
      }

      #vignette {
        position: absolute;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(ellipse at 26% 44%, transparent 34%, rgba(2,5,10,0.58) 100%);
      }

      #bg-flash {
        position: absolute;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        opacity: 0;
        background: linear-gradient(105deg, transparent 35%, rgba(20,168,244,0.38) 52%, rgba(20,168,244,0.12) 62%, transparent 78%);
        transform: translateX(120%);
      }

      #mesh {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        mask-image: linear-gradient(to right, transparent 40%, black 56%, black 100%);
      }

      #mesh svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .mesh-line {
        fill: none;
        stroke: rgba(20,168,244,0.44);
        stroke-width: 1.1;
        stroke-linecap: round;
      }

      .mesh-node {
        fill: rgba(20,168,244,0.88);
        transform-box: fill-box;
        transform-origin: center center;
      }

      .node-pulse {
        fill: none;
        stroke: rgba(20,168,244,0.6);
        stroke-width: 1.5;
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center center;
      }

      #mesh-link {
        fill: none;
        stroke: rgba(20,168,244,0.5);
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-dasharray: 420;
        stroke-dashoffset: 420;
        opacity: 0;
        filter: drop-shadow(0 0 6px rgba(20,168,244,0.45));
      }

      #signal-pulse-1,
      #signal-pulse-2 {
        fill: #14A8F4;
        opacity: 0;
        filter: drop-shadow(0 0 8px rgba(20,168,244,0.85));
      }

      #particles {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        mask-image: linear-gradient(to right, transparent 52%, black 68%, black 100%);
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(20,168,244,0.6);
        box-shadow: 0 0 8px rgba(20,168,244,0.5);
        opacity: 0;
      }

      #scanline {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        top: -60px;
        z-index: 6;
        opacity: 0;
        pointer-events: none;
        background: linear-gradient(90deg, transparent 6%, rgba(20,168,244,0.62) 50%, transparent 94%);
        box-shadow: 0 0 20px rgba(20,168,244,0.38);
      }

      #grain {
        position: absolute;
        inset: 0;
        z-index: 11;
        opacity: 0.038;
        pointer-events: none;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      .art-content-e {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 64px 60px 52px 68px;
      }

      .logo {
        height: 128px;
        width: auto;
        max-width: 440px;
        object-fit: contain;
        object-position: left center;
      }

      .center-e {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 56%;
        padding: 20px 0;
      }

      .headline {
        font-family: 'Ubuntu', sans-serif;
        font-weight: 700;
        font-size: 58px;
        line-height: 1.08;
        text-transform: uppercase;
        color: #F6F8FF;
        letter-spacing: -0.01em;
        margin-bottom: 32px;
      }

      .hl-row {
        display: block;
        overflow: hidden;
      }

      .hl-inner {
        display: inline-block;
        position: relative;
      }

      .blue {
        color: #14A8F4;
        position: relative;
      }

      .blue-shine {
        position: absolute;
        inset: 0;
        background: linear-gradient(105deg, transparent 32%, rgba(255,255,255,0.62) 50%, transparent 68%);
        opacity: 0;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .divider {
        width: 72px;
        height: 4px;
        background: linear-gradient(90deg, #14A8F4, transparent);
        margin-bottom: 26px;
        transform-origin: left center;
      }

      .subtitle {
        font-size: 24px;
        line-height: 1.65;
        color: #D5D8ED;
        max-width: 480px;
      }

      .bottom-e {
        max-width: 72%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .cta-wrap {
        position: relative;
        display: inline-block;
        width: fit-content;
      }

      #cta-pulse {
        position: absolute;
        inset: -14px -20px;
        border-radius: 999px;
        border: 1px solid rgba(20,168,244,0.55);
        opacity: 0;
        pointer-events: none;
        transform-origin: center center;
        box-shadow: 0 0 24px rgba(20,168,244,0.25);
      }

      .cta-pill {
        position: relative;
        display: inline-flex;
        align-items: center;
        overflow: hidden;
        width: fit-content;
        background: rgba(20,168,244,0.12);
        border: 1px solid rgba(20,168,244,0.52);
        color: #14A8F4;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        padding: 16px 32px;
        z-index: 1;
        box-shadow: 0 0 0 rgba(20,168,244,0);
      }

      #cta-shine {
        position: absolute;
        top: -10%;
        bottom: -10%;
        left: 0;
        width: 38%;
        background: linear-gradient(115deg, transparent, rgba(255,255,255,0.42), transparent);
        opacity: 0;
        pointer-events: none;
        z-index: 2;
        transform: skewX(-18deg);
      }

      .pill-arrow {
        margin-left: 20px;
        font-size: 24px;
        display: inline-block;
      }

      .eco-row {
        display: flex;
        align-items: center;
        gap: 32px;
        padding-top: 20px;
        border-top: 1px solid rgba(246,248,255,0.1);
      }

      .eco-row img {
        height: 60px;
        width: auto;
        object-fit: contain;
        filter: brightness(0) invert(1);
        opacity: 0.88;
      }

      .eco-sep {
        width: 1px;
        height: 28px;
        background: rgba(246,248,255,0.12);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="signal-mesh-enhanced-10s" data-start="0" data-width="1080" data-height="1350" data-duration="10">
      <section id="scene" class="clip scene" data-start="0" data-duration="10" data-track-index="1">
        <div class="bg-wrap" id="bg-wrap">
          <img class="bg-img" id="bg" src="assets/fundo.png" alt="" />
        </div>
        <div id="overlay"></div>
        <div id="vignette"></div>
        <div id="bg-flash"></div>

        <div id="mesh">
          <svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g id="mesh-lines">
              <path class="mesh-line" d="M610 160 L770 95 L910 185 L850 330 L710 365 L630 265 Z" />
              <path class="mesh-line" d="M670 400 L830 345 L970 465 L895 605 L735 565 L655 485 Z" />
              <path class="mesh-line" d="M710 660 L870 605 L1010 745 L930 905 L770 845 L690 745 Z" />
              <path class="mesh-line" d="M630 900 L790 845 L930 965 L855 1105 L695 1045 L615 965 Z" />
              <path class="mesh-line" d="M770 95 L830 345 L870 605 L790 845" />
              <path class="mesh-line" d="M910 185 L970 465 L1010 745 L930 965" />
              <path class="mesh-line" d="M710 365 L735 565 L770 845 L695 1045" />
              <path class="mesh-line" d="M850 330 L895 605 L930 905 L520 980" />
            </g>
            <g id="mesh-nodes">
              <circle class="mesh-node" cx="770" cy="95" r="4" />
              <circle class="mesh-node" cx="910" cy="185" r="3.5" />
              <circle class="mesh-node" cx="850" cy="330" r="4" />
              <circle class="mesh-node" cx="710" cy="365" r="3" />
              <circle class="mesh-node" cx="830" cy="345" r="3.5" />
              <circle class="mesh-node" cx="970" cy="465" r="4" />
              <circle class="mesh-node" cx="895" cy="605" r="3" />
              <circle class="mesh-node" cx="870" cy="605" r="3.5" />
              <circle class="mesh-node" cx="1010" cy="745" r="4" />
              <circle class="mesh-node" cx="930" cy="905" r="3" />
              <circle class="node-pulse" cx="970" cy="465" r="9" />
              <circle class="node-pulse" cx="1010" cy="745" r="10" />
              <circle class="node-pulse" cx="850" cy="330" r="8" />
              <circle class="node-pulse" cx="895" cy="605" r="7" />
            </g>
            <circle id="signal-pulse-1" r="5" cx="770" cy="95" />
            <circle id="signal-pulse-2" r="4.5" cx="910" cy="185" />
            <path id="mesh-link" d="M930 905 L680 1020 L380 1080" />
          </svg>
        </div>

        <div id="particles">
          <span class="particle" style="left:71%;top:18%"></span>
          <span class="particle" style="left:83%;top:34%"></span>
          <span class="particle" style="left:76%;top:52%"></span>
          <span class="particle" style="left:87%;top:68%"></span>
          <span class="particle" style="left:69%;top:82%"></span>
          <span class="particle" style="left:92%;top:14%"></span>
        </div>

        <div id="scanline"></div>

        <div class="art-content-e" id="content">
          <div class="top-e">
            <img class="logo" id="logo" src="assets/logo-cyberfest.png" alt="CybersecFEST" />
          </div>
          <div class="center-e">
            <h1 class="headline headline-e" id="headline">
              <span class="hl-row"><span class="hl-inner" id="row-1"><span class="blue">C-Levels<span class="blue-shine"></span></span></span></span>
              <span class="hl-row"><span class="hl-inner" id="row-2">reunidos em BH,</span></span>
              <span class="hl-row"><span class="hl-inner" id="row-3">a maior</span></span>
              <span class="hl-row"><span class="hl-inner" id="row-4"><span class="blue">confraria<span class="blue-shine"></span></span></span></span>
              <span class="hl-row"><span class="hl-inner" id="row-5">cyber</span></span>
            </h1>
            <div class="divider divider-e" id="divider"></div>
            <p class="subtitle subtitle-e" id="subtitle">Participe da edição mais exclusiva do CybersecFEST em Belo Horizonte e transforme seu networking.</p>
          </div>
          <div class="bottom-e">
            <div class="cta-wrap">
              <div id="cta-pulse"></div>
              <div class="cta-pill" id="cta">
                INSCRIÇÕES ABERTAS
                <span class="pill-arrow" id="cta-arrow">→</span>
              </div>
              <div id="cta-shine"></div>
            </div>
            <div class="eco-row" id="ecosystem">
              <img src="assets/logo-devops.webp" alt="" />
              <div class="eco-sep"></div>
              <img src="assets/logo-iam.webp" alt="" />
              <div class="eco-sep"></div>
              <img src="assets/logo-alcatraz.webp" alt="" />
            </div>
          </div>
        </div>

        <div id="grain"></div>
      </section>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      document.querySelectorAll('#mesh-lines path').forEach((path) => {
        const len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
      });

      /* 0.0–0.55 — Impacto inicial */
      tl.fromTo('#bg-wrap',
        { scale: 1.14, x: 28, y: 6 },
        { scale: 1.042, x: 0, y: 0, duration: 10, ease: 'none' },
        0
      );

      tl.fromTo('#bg',
        { filter: 'brightness(0.42) saturate(0.85)' },
        { filter: 'brightness(0.96) saturate(1.05)', duration: 0.8, ease: 'power2.out' },
        0
      );

      tl.to('#bg', {
        filter: 'brightness(0.96) saturate(1.05) drop-shadow(-3px 0 rgba(255,40,80,0.22)) drop-shadow(3px 0 rgba(0,200,255,0.22))',
        duration: 0.07,
        ease: 'none',
      }, 0.12);
      tl.to('#bg', {
        filter: 'brightness(0.96) saturate(1.05)',
        duration: 0.08,
        ease: 'power2.in',
      }, 0.19);

      tl.fromTo('#overlay',
        { opacity: 0.92 },
        { opacity: 0.68, duration: 1.1, ease: 'power2.out' },
        0
      );

      tl.fromTo('#vignette',
        { opacity: 0 },
        { opacity: 1, duration: 0.75, ease: 'power2.out' },
        0.05
      );

      tl.fromTo('#bg-flash',
        { x: '120%', opacity: 0 },
        { x: '-35%', opacity: 0.95, duration: 0.42, ease: 'power3.out' },
        0.06
      );
      tl.to('#bg-flash', { opacity: 0, duration: 0.28, ease: 'power2.in' }, 0.48);

      /* 0.55–1.40 — Sistema ativado */
      tl.from('#logo',
        { y: -16, opacity: 0, duration: 0.62, ease: 'power3.out' },
        0.55
      );

      tl.fromTo('#scanline',
        { y: -60, opacity: 0 },
        { y: 180, opacity: 0.32, duration: 0.55, ease: 'power2.inOut' },
        0.62
      );
      tl.to('#scanline', { opacity: 0, duration: 0.2 }, 1.17);

      tl.fromTo('#mesh-lines path',
        { strokeDashoffset: (i, el) => el.getTotalLength(), opacity: 0 },
        { strokeDashoffset: 0, opacity: 0.52, duration: 1.15, stagger: 0.07, ease: 'power2.out' },
        0.72
      );

      /* 1.20–2.60 — Rede conectada + parallax */
      tl.fromTo('#mesh',
        { x: 18, y: 8, scale: 0.98 },
        { x: -6, y: -4, scale: 1, duration: 8.8, ease: 'none' },
        1.2
      );

      tl.fromTo('#mesh-nodes .mesh-node',
        { scale: 0, opacity: 0, transformOrigin: 'center center' },
        { scale: 1, opacity: 0.92, duration: 0.26, stagger: 0.06, ease: 'power2.out' },
        1.28
      );

      tl.fromTo('#signal-pulse-1',
        { opacity: 0, attr: { cx: 770, cy: 95 } },
        { opacity: 0.95, duration: 0.08, ease: 'power1.out' },
        1.55
      );
      tl.to('#signal-pulse-1', { attr: { cx: 830, cy: 345 }, duration: 0.28, ease: 'power1.inOut' }, 1.55);
      tl.to('#signal-pulse-1', { attr: { cx: 870, cy: 605 }, duration: 0.32, ease: 'power1.inOut' }, 1.83);
      tl.to('#signal-pulse-1', { attr: { cx: 790, cy: 845 }, duration: 0.28, ease: 'power1.inOut' }, 2.15);
      tl.to('#signal-pulse-1', { opacity: 0, duration: 0.15 }, 2.38);

      tl.fromTo('#signal-pulse-2',
        { opacity: 0, attr: { cx: 910, cy: 185 } },
        { opacity: 0.9, duration: 0.08, ease: 'power1.out' },
        1.85
      );
      tl.to('#signal-pulse-2', { attr: { cx: 970, cy: 465 }, duration: 0.3, ease: 'power1.inOut' }, 1.85);
      tl.to('#signal-pulse-2', { attr: { cx: 1010, cy: 745 }, duration: 0.34, ease: 'power1.inOut' }, 2.15);
      tl.to('#signal-pulse-2', { attr: { cx: 930, cy: 905 }, duration: 0.32, ease: 'power1.inOut' }, 2.49);
      tl.to('#signal-pulse-2', { opacity: 0, duration: 0.18 }, 2.76);

      tl.fromTo('#particles',
        { y: 10 },
        { y: -8, duration: 8, ease: 'none' },
        1.3
      );

      tl.fromTo('#content',
        { y: 12 },
        { y: -4, duration: 8.5, ease: 'none' },
        1.5
      );

      /* 1.70–3.60 — Headline */
      tl.fromTo('#row-1, #row-2, #row-3, #row-4, #row-5',
        { y: 48, opacity: 0, clipPath: 'inset(100% 0 0 0)' },
        { y: 0, opacity: 1, clipPath: 'inset(0% 0 0 0)', duration: 0.52, stagger: 0.1, ease: 'expo.out' },
        1.7
      );

      tl.fromTo('.blue-shine',
        { x: '-130%', opacity: 0 },
        { x: '130%', opacity: 0.8, duration: 0.48, stagger: 0.18, ease: 'power2.inOut' },
        2.35
      );
      tl.set('.blue-shine', { opacity: 0 }, 2.88);

      /* 3.50–4.60 — Contexto */
      tl.fromTo('#divider',
        { scaleX: 0, transformOrigin: 'left center' },
        { scaleX: 1, duration: 0.48, ease: 'power3.out' },
        3.5
      );

      tl.fromTo('#subtitle',
        { y: 14, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.58, ease: 'power3.out' },
        3.72
      );

      tl.fromTo('#mesh-nodes .node-pulse:nth-child(11)',
        { scale: 0.6, opacity: 0.55 },
        { scale: 2.2, opacity: 0, duration: 0.75, ease: 'power2.out' },
        3.65
      );

      /* 4.60–5.80 — Convite liberado */
      tl.fromTo('#cta-pulse',
        { scale: 0.55, opacity: 0.75 },
        { scale: 1.85, opacity: 0, duration: 1.05, ease: 'power2.out' },
        4.62
      );

      tl.fromTo('#cta',
        { y: 16, scale: 0.88, opacity: 0, boxShadow: '0 0 0 rgba(20,168,244,0)' },
        { y: 0, scale: 1, opacity: 1, boxShadow: '0 0 28px rgba(20,168,244,0.22)', duration: 0.72, ease: 'back.out(1.5)' },
        4.68
      );

      tl.fromTo('#cta-arrow',
        { x: -10, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.38, ease: 'power3.out' },
        5.12
      );

      tl.fromTo('#mesh-link',
        { strokeDashoffset: 420, opacity: 0 },
        { strokeDashoffset: 0, opacity: 0.62, duration: 1.05, ease: 'power2.inOut' },
        4.75
      );

      tl.from('#ecosystem img',
        { y: 12, opacity: 0, duration: 0.36, stagger: 0.07, ease: 'power2.out' },
        5.25
      );

      /* 5.80–7.40 — Ambiente vivo */
      tl.fromTo('#scanline',
        { y: 200, opacity: 0 },
        { y: 1320, opacity: 0.14, duration: 3.2, ease: 'none' },
        5.85
      );

      tl.to('#mesh-nodes .node-pulse',
        { scale: 2.5, opacity: 0, duration: 0.85, stagger: 0.4, ease: 'power2.out' },
        6.1
      );

      tl.to('.particle',
        { opacity: 0.7, duration: 1.1, stagger: 0.2, ease: 'sine.inOut' },
        5.9
      );
      tl.to('.particle',
        { y: -16, duration: 3.8, stagger: 0.25, ease: 'sine.inOut' },
        6.05
      );

      /* 7.40–10.0 — Final premium */
      tl.fromTo('#cta-shine',
        { xPercent: -180, opacity: 0 },
        { xPercent: 220, opacity: 0.85, duration: 0.92, ease: 'power2.inOut' },
        7.45
      );
      tl.to('#cta-shine', { opacity: 0, duration: 0.22, ease: 'power2.in', overwrite: 'auto' }, 8.37);

      tl.to('#cta',
        { boxShadow: '0 0 42px rgba(20,168,244,0.38)', duration: 0.5, ease: 'power2.out' },
        7.45
      );
      tl.to('#cta',
        { boxShadow: '0 0 28px rgba(20,168,244,0.22)', duration: 0.6, ease: 'power2.in' },
        8.05
      );

      tl.to('#mesh-link',
        { opacity: 0.38, duration: 0.5, ease: 'power1.inOut' },
        8.2
      );

      window.__timelines['signal-mesh-enhanced-10s'] = tl;
    </script>
  </body>
</html>
