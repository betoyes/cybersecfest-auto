<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1350" />
    <title>CybersecFEST — O Risco Não Espera · Motion v1</title>
    <style>
      @font-face { font-family:'Ubuntu';     font-weight:700; src:url('assets/fonts/Ubuntu-Bold.woff2') format('woff2'); }
      @font-face { font-family:'Montserrat'; font-weight:400; src:url('assets/fonts/Montserrat-Regular.woff2') format('woff2'); }
      @font-face { font-family:'Montserrat'; font-weight:600; src:url('assets/fonts/Montserrat-SemiBold.woff2') format('woff2'); }
      @font-face { font-family:'Montserrat'; font-weight:700; src:url('assets/fonts/Montserrat-Bold.woff2') format('woff2'); }

      *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
      html, body { width:1080px; height:1350px; overflow:hidden; background:#02050a; }

      #root {
        position:relative; width:1080px; height:1350px;
        overflow:hidden;
        /* Gradiente atmosférico CSS — substitui o fundo escuro puro com profundidade */
        background:
          radial-gradient(ellipse at 72% 46%, rgba(20,168,244,0.12) 0%, transparent 48%),
          radial-gradient(ellipse at 55% 88%, rgba(6,20,55,0.45) 0%, transparent 42%),
          radial-gradient(ellipse at 30% 50%, rgba(4,10,30,0.6) 0%, transparent 55%),
          #02050a;
        font-family:'Montserrat', sans-serif; color:#F6F8FF;
      }

      /* ══ L1 — FUNDO
         fundo-raw.png = foto pura sem texto. Overlay sólido cobre a esquerda.
         object-position 72% mantém o personagem visível no lado direito.
         ══ */
      #bg-wrap {
        position:absolute;
        inset: -10%;
        z-index:1;
        transform-origin: 68% 46%;
        will-change: transform;
      }
      #bg {
        position:absolute; inset:0;
        width:100%; height:100%;
        object-fit:cover; object-position:72% 50%;
        opacity:0;
        will-change:opacity;
      }

      /* ══ L2 — OVERLAY ATMOSFÉRICO
         Esquerda 100% sólida para cobrir qualquer texto baked (thumb ou fundo-raw).
         Sempre visível (opacity:1) — sem risco de ghost text no primeiro frame.
         ══ */
      #overlay {
        position:absolute; inset:0; z-index:2;
        pointer-events:none; opacity:1;
        background:
          linear-gradient(to right,
            #02050a 0%,
            #02050a 55%,
            rgba(2,5,10,0.18) 78%,
            rgba(2,5,10,0.00) 100%
          ),
          linear-gradient(to top,
            rgba(2,5,10,0.80) 0%,
            rgba(2,5,10,0.00) 32%
          );
      }

      /* ══ L3 — LUZ AZUL ATMOSFÉRICA (lado direito) ══ */
      #blue-glow {
        position:absolute; right:-80px; top:42%;
        transform:translateY(-50%);
        width:720px; height:900px; border-radius:50%;
        z-index:3; pointer-events:none;
        background:radial-gradient(
          ellipse at 55% 46%,
          rgba(20,168,244,0.28) 0%,
          rgba(20,168,244,0.11) 42%,
          transparent 72%
        );
        filter:blur(24px); mix-blend-mode:screen; opacity:0;
        will-change:opacity;
      }

      /* ══ L4 — PARTÍCULAS ══ */
      #particles { position:absolute; inset:0; z-index:4; pointer-events:none; opacity:0; }

      /* ══ L5 — VINHETA CINEMÁTICA ══ */
      #vignette {
        position:absolute; inset:0; z-index:5; pointer-events:none;
        background:radial-gradient(ellipse at 50% 50%, transparent 48%, rgba(2,5,10,0.55) 100%);
      }

      /* ══ L6 — CONTEÚDO HTML ANIMADO ══
         Layout pixel-perfect com a arte estática (2× a arte do editor 540→1080) */
      #content {
        position:absolute; inset:0; z-index:10;
        display:flex; flex-direction:column; justify-content:space-between;
        padding:64px 60px 52px 68px;
      }

      /* Logo */
      #logo-wrap {
        display:inline-block; align-self:flex-start;
        position:relative; overflow:hidden;
        clip-path: inset(0% 100% 0% 0%);   /* inicia hidden, animado por GSAP */
      }
      #logo {
        display:block; height:128px; width:auto; max-width:440px;
        object-fit:contain; object-position:left center;
        will-change:filter;
      }
      #logo-sweep {
        position:absolute; inset:0; z-index:1; pointer-events:none;
        background:linear-gradient(108deg,
          transparent 0%, transparent 22%,
          rgba(255,255,255,0.7) 42%, rgba(20,168,244,0.5) 50%,
          transparent 70%, transparent 100%
        );
        transform:translateX(-130%);
      }

      /* Bloco central */
      #center {
        flex:1;
        display:flex; flex-direction:column; justify-content:center;
        max-width:58%; padding:10px 0; overflow:visible;
      }

      /* Cada linha */
      .hl-line {
        display:block;
        font-family:'Ubuntu', sans-serif; font-weight:700;
        font-size:58px; line-height:1.08;
        text-transform:uppercase; color:#F6F8FF;
        letter-spacing:-0.01em; margin-bottom:6px; overflow:visible;
      }

      /* Cada palavra (unidade de animação) */
      .word {
        display:inline-block; opacity:0;
        will-change:transform, opacity, filter;
      }
      .space { display:inline; }

      .blue { color:#14A8F4; will-change:text-shadow; }

      /* Divisória */
      #divider {
        width:72px; height:4px;
        background:linear-gradient(90deg, #14A8F4 0%, rgba(20,168,244,0.18) 100%);
        margin:22px 0 18px; transform-origin:left center;
        transform:scaleX(0); opacity:0; will-change:transform,opacity;
      }

      /* Subtítulo */
      #subtitle {
        font-family:'Montserrat', sans-serif; font-weight:400;
        font-size:22px; line-height:1.65;
        color:#D5D8ED; max-width:480px; letter-spacing:0.01em;
      }
      .sub-line { display:block; opacity:0; will-change:transform,opacity; }

      /* Logos parceiros */
      #bottom { display:flex; flex-direction:column; gap:22px; max-width:65%; }
      #ecosystem {
        display:flex; align-items:center; gap:32px;
        padding-top:20px; border-top:1px solid rgba(246,248,255,0.1);
      }
      .eco-logo {
        height:60px; width:auto; max-width:180px;
        object-fit:contain; object-position:left center;
        filter:brightness(0) invert(1);
        opacity:0; will-change:transform,opacity;
      }
      .eco-sep { width:1px; height:44px; background:rgba(246,248,255,0.15); flex-shrink:0; opacity:0; }

      /* ══ L7 — FLASH DIAGONAL ══ */
      #flash {
        position:absolute; inset:0; z-index:20; pointer-events:none; opacity:0;
        background:linear-gradient(108deg,
          transparent 0%, transparent 28%,
          rgba(255,255,255,0.12) 43%, rgba(20,168,244,0.08) 50%,
          transparent 65%, transparent 100%
        );
        transform:translateX(-115%);
      }
    </style>
  </head>
  <body>
    <div id="root">

      <!-- Fundo: foto pura sem texto (fundo-raw.png). Overlay cobre a esquerda. -->
      <div id="bg-wrap"><img id="bg" src="assets/fundo-raw.png" alt="" /></div>

      <!-- Overlay atmosférico (esquerda 100% sólida para área de texto) -->
      <div id="overlay"></div>

      <!-- Luz azul atrás do personagem -->
      <div id="blue-glow"></div>

      <!-- Partículas digitais -->
      <canvas id="particles"></canvas>

      <!-- Vinheta cinemática -->
      <div id="vignette"></div>

      <!-- ─── CONTEÚDO HTML ─── -->
      <div id="content">

        <!-- Logo CybersecFEST -->
        <div id="logo-wrap">
          <img id="logo" src="assets/logo-cyberfest.png" alt="CybersecFEST" />
          <div id="logo-sweep"></div>
        </div>

        <!-- Título + divisória + subtítulo -->
        <div id="center">
          <div class="hl-line">
            <span class="word" id="wO">O</span><span class="space">&nbsp;</span><span class="word blue" id="wRisco">RISCO</span><span class="space">&nbsp;</span><span class="word" id="wNao">NÃO</span>
          </div>
          <div class="hl-line">
            <span class="word" id="wEspera">ESPERA</span><span class="space">&nbsp;</span><span class="word" id="wVoce">VOCÊ</span>
          </div>
          <div class="hl-line">
            <span class="word" id="wSe">SE</span><span class="space">&nbsp;</span><span class="word blue" id="wAtualizar">ATUALIZAR</span><span class="word" id="wDot">.</span>
          </div>
          <div id="divider"></div>
          <div id="subtitle">
            <span class="sub-line" id="sub1">Venha debater com quem está no campo.</span>
            <span class="sub-line" id="sub2">Uma edição. Um encontro que muda perspectiva.</span>
          </div>
        </div>

        <!-- Logos parceiros -->
        <div id="bottom">
          <div id="ecosystem">
            <img class="eco-logo" id="eco1" src="assets/logo-iam.webp"      alt="IAM Tech Day"       />
            <div class="eco-sep" id="sep1"></div>
            <img class="eco-logo" id="eco2" src="assets/logo-alcatraz.webp" alt="Alcatraz Security"  />
            <div class="eco-sep" id="sep2"></div>
            <img class="eco-logo" id="eco3" src="assets/logo-devops.webp"   alt="DevOps"             />
          </div>
        </div>

      </div><!-- /content -->

      <!-- Flash cinemático -->
      <div id="flash"></div>

    </div><!-- /root -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    (function () {
      'use strict';

      /* ── PARTÍCULAS ─────────────────────────────────────────── */
      function initParticles() {
        const cv = document.getElementById('particles');
        const ctx = cv.getContext('2d');
        cv.width = 1080; cv.height = 1350;
        const dots = Array.from({ length: 22 }, () => ({
          x: 430 + Math.random() * 630,
          y: Math.random() * 1350,
          r: 0.6 + Math.random() * 1.9,
          vx: (Math.random() - 0.5) * 0.14,
          vy: -0.08 - Math.random() * 0.17,
          a: 0.10 + Math.random() * 0.38,
          ph: Math.random() * Math.PI * 2,
        }));
        let f = 0;
        (function tick() {
          ctx.clearRect(0, 0, 1080, 1350);
          f++;
          dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if (d.y < -8) d.y = 1358;
            if (d.x < 390) d.x = 1090;
            const p = 0.68 + 0.32 * Math.sin(d.ph + f * 0.012);
            ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(20,168,244,${(d.a * p).toFixed(3)})`; ctx.fill();
          });
          requestAnimationFrame(tick);
        })();
      }

      /* ── LOOP AMBIENTE ──────────────────────────────────────── */
      function startAmbient() {
        const bgWrap = document.getElementById('bg-wrap');
        const glow   = document.getElementById('blue-glow');
        const ptcl   = document.getElementById('particles');
        const risco  = document.getElementById('wRisco');
        const atual  = document.getElementById('wAtualizar');
        const logo   = document.getElementById('logo');

        /* Respiração do fundo */
        gsap.to(bgWrap, { scale: 1.04, duration: 6.5, ease: 'sine.inOut', yoyo:true, repeat:-1 });

        /* Pulso da luz azul */
        gsap.to(glow, { opacity: 0.80, duration: 4.8, ease: 'sine.inOut', yoyo:true, repeat:-1 });

        /* Partículas surgem */
        gsap.to(ptcl, { opacity: 0.85, duration: 2, ease: 'power1.in' });

        /* Glow contínuo nas palavras azuis */
        gsap.to([risco, atual], {
          textShadow: '0 0 28px rgba(20,168,244,0.9), 0 0 10px rgba(20,168,244,0.5)',
          duration: 3.8, ease: 'sine.inOut', yoyo:true, repeat:-1, stagger: 0.7,
        });

        /* Micro-brilho periódico no logo */
        function shimmer() {
          gsap.to(logo, {
            filter: 'drop-shadow(0 0 22px rgba(20,168,244,1)) drop-shadow(0 0 8px rgba(255,255,255,0.5))',
            duration: 0.28, ease: 'power2.out',
            onComplete: () => gsap.to(logo, { filter: 'drop-shadow(0 0 5px rgba(20,168,244,0.35))', duration: 0.9, ease: 'power1.in' }),
          });
        }
        gsap.delayedCall(5.0, shimmer);
        gsap.delayedCall(12.0, shimmer);

        /* Flash diagonal periódico */
        function flash() {
          const fl = document.getElementById('flash');
          gsap.fromTo(fl,
            { x: '-115%', opacity: 0.6 },
            { x: '115%', duration: 1.0, ease: 'power2.inOut', opacity: 0.6,
              onComplete: () => gsap.set(fl, { opacity: 0 }) }
          );
        }
        gsap.delayedCall(5.8, flash);
        gsap.delayedCall(14.5, flash);
      }

      /* ── LINHA DO TEMPO PRINCIPAL ───────────────────────────── */
      function buildTimeline() {
        const tl = gsap.timeline({ onComplete: startAmbient });

        /* ─ 0s: Background aparece (overlay já está opacity:1 desde o CSS) ─ */
        tl.to('#bg',      { opacity: 1, duration: 1.2, ease: 'power2.out' }, 0);
        /* Ken Burns intro: zoom out suave */
        tl.fromTo('#bg-wrap', { scale: 1.07 }, { scale: 1.0, duration: 4.2, ease: 'power1.out' }, 0);

        /* ─ 0.3s: Luz azul atmosférica ─ */
        tl.to('#blue-glow', { opacity: 0.45, duration: 3.0, ease: 'power2.out' }, 0.3);

        /* ─ 0.8s: LOGO — wipe clip-path ─ */
        tl.fromTo('#logo-wrap',
          { clipPath: 'inset(0% 100% 0% 0%)' },
          { clipPath: 'inset(0% 0% 0% 0%)',   duration: 0.9, ease: 'power3.out' },
        0.8);
        /* Varredura de luz */
        tl.fromTo('#logo-sweep',
          { x: '-130%' }, { x: '130%', duration: 0.65, ease: 'power2.inOut' },
        1.6);
        /* Burst de glow no logo */
        tl.to('#logo', {
          filter: 'drop-shadow(0 0 18px rgba(20,168,244,1)) drop-shadow(0 0 6px rgba(255,255,255,0.45))',
          duration: 0.3, ease: 'power2.out',
        }, 1.55);
        tl.to('#logo', {
          filter: 'drop-shadow(0 0 5px rgba(20,168,244,0.35))',
          duration: 0.95, ease: 'power1.in',
        }, 1.87);

        /* ─ 2.0s: TÍTULO linha 1 — O | RISCO | NÃO ─ */
        tl.fromTo('#wO',
          { opacity:0, y:22, filter:'blur(3px)' },
          { opacity:1, y:0,  filter:'blur(0px)', duration:0.5, ease:'power3.out' },
        2.0);
        tl.fromTo('#wRisco',
          { opacity:0, y:22, filter:'blur(3px)', textShadow:'0 0 0 rgba(20,168,244,0)' },
          { opacity:1, y:0,  filter:'blur(0px)', textShadow:'0 0 36px rgba(20,168,244,1), 0 0 14px rgba(20,168,244,0.6)',
            duration:0.55, ease:'power3.out' },
        2.18);
        tl.to('#wRisco', { textShadow:'0 0 10px rgba(20,168,244,0.5)', duration:0.9, ease:'power1.in' }, 2.75);
        tl.fromTo('#wNao',
          { opacity:0, y:22, filter:'blur(3px)' },
          { opacity:1, y:0,  filter:'blur(0px)', duration:0.5, ease:'power3.out' },
        2.36);

        /* ─ 2.95s: TÍTULO linha 2 — ESPERA | VOCÊ ─ */
        tl.fromTo(['#wEspera', '#wVoce'],
          { opacity:0, y:20 },
          { opacity:1, y:0, duration:0.6, ease:'power3.out', stagger:0.13 },
        2.95);

        /* ─ 3.8s: TÍTULO linha 3 — SE | ATUALIZAR | . ─ */
        tl.fromTo('#wSe',
          { opacity:0, y:20 },
          { opacity:1, y:0, duration:0.5, ease:'power3.out' },
        3.8);
        tl.fromTo('#wAtualizar',
          { opacity:0, y:22, filter:'blur(3px)', textShadow:'0 0 0 rgba(20,168,244,0)' },
          { opacity:1, y:0,  filter:'blur(0px)', textShadow:'0 0 40px rgba(20,168,244,1), 0 0 16px rgba(20,168,244,0.65)',
            duration:0.6, ease:'power3.out' },
        3.98);
        tl.to('#wAtualizar', { textShadow:'0 0 10px rgba(20,168,244,0.5)', duration:1.0, ease:'power1.in' }, 4.6);
        tl.fromTo('#wDot', { opacity:0 }, { opacity:1, duration:0.3, ease:'power2.out' }, 4.45);

        /* ─ 4.85s: DIVISÓRIA ─ */
        tl.to('#divider', { opacity:1, duration:0.15 }, 4.85);
        tl.fromTo('#divider', { scaleX:0 }, { scaleX:1, duration:0.58, ease:'power3.out' }, 4.85);

        /* ─ 5.55s: SUBTÍTULO linha por linha ─ */
        tl.fromTo('#sub1', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.65, ease:'power3.out' }, 5.55);
        tl.fromTo('#sub2', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.65, ease:'power3.out' }, 6.15);

        /* ─ 7.3s: LOGOS PARCEIROS ─ */
        tl.fromTo(['#eco1','#sep1','#eco2','#sep2','#eco3'],
          { opacity:0, y:18 },
          { opacity:(i) => [0.78,0.65,0.78,0.65,0.78][i], y:0,
            duration:0.7, ease:'power3.out', stagger:0.12 },
        7.3);

        return tl;
      }

      /* ── BOOT ───────────────────────────────────────────────── */
      window.addEventListener('load', function () {
        gsap.set('#divider', { scaleX:0, opacity:0 });
        initParticles();
        buildTimeline();
      });

    })();
    </script>
  </body>
</html>
