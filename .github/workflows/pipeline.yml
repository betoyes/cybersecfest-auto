name: CybersecFEST — Pipeline Orquestrador

on:
  schedule:
    # seg/qua/sex às 11h UTC = 08h BRT
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:
    inputs:
      tipo_post:
        description: 'Tipo de post (deixe vazio para usar calendário)'
        required: false
        type: choice
        options: ['', 'blog', 'evento', 'palestrante', 'patrocinador', 'cidade']

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: _scripts/package-lock.json

      - name: Install dependencies
        working-directory: _scripts
        run: npm ci

      - name: Run Pipeline
        working-directory: _scripts
        env:
          GH_PAT_CREAO:          ${{ secrets.GH_PAT_CREAO }}
          OPENAI_API_KEY_CREAO:  ${{ secrets.OPENAI_API_KEY_CREAO }}
          GEMINI_API_KEY_CREAO:  ${{ secrets.GEMINI_API_KEY_CREAO }}
          TIPO_POST_OVERRIDE:    ${{ github.event.inputs.tipo_post }}
        run: node pipeline.js
