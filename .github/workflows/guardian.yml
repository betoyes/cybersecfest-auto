name: CybersecFEST — Guardian

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: CREAO-PROJECT

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: _scripts/package-lock.json

      - name: Install dependencies
        working-directory: _scripts
        run: npm ci

      - name: Run Guardian
        working-directory: _scripts
        env:
          GH_PAT_CREAO:         ${{ secrets.GH_PAT_CREAO }}
          OPENAI_API_KEY_CREAO: ${{ secrets.OPENAI_API_KEY_CREAO }}
          GEMINI_API_KEY_CREAO: ${{ secrets.GEMINI_API_KEY_CREAO }}
        run: node guardian.js
